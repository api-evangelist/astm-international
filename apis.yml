aid: astm-international
name: ASTM International
description: >-
  ASTM International is one of the world's largest voluntary standards
  development organizations, founded in 1898. ASTM publishes more than
  13,000 globally recognized consensus standards across 150+ technical
  committees and 2,100+ subcommittees, developed by 30,000+ volunteer
  members from 140+ countries. ASTM standards span ferrous and nonferrous
  metals, cement and concrete, petroleum, plastics, textiles, additive
  manufacturing, medical devices, consumer products, unmanned aircraft,
  artificial intelligence in manufacturing, and dozens of other domains.
  Standards are delivered through the ASTM Compass platform, ASTM Digital
  Library, ASTM SpecBuilder, and through publisher and reseller channels.
  ASTM does not publish a public REST API for its catalog; integration with
  Compass is via SAML SSO, Shibboleth, OpenAthens, and IP authentication.
type: Index
