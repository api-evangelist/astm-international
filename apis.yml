  - type: Features
    data:
      - name: Consensus Standards Development
        description: >-
          ASTM develops voluntary, consensus-based standards through 150+
          technical committees and 2,100+ subcommittees made up of 30,000+
          volunteer members from 140+ countries.
      - name: Six Normative Document Types
        description: >-
          ASTM's Form and Style defines six standard types — Test Method,
          Specification, Practice, Guide, Classification, and Terminology —
          each with prescribed scope and authoring conventions.
      - name: Committee Designation System
        description: >-
          Standards carry a letter-prefix designation tied to the committee
          that owns them: A (ferrous metals), B (nonferrous metals), C
          (cementitious/ceramic/concrete/masonry), D (miscellaneous
          materials), E (miscellaneous subjects), F (end-use materials and
          products), G (corrosion/weathering/degradation), and J (joint
          committees with other SDOs).
      - name: ASTM Compass Platform
        description: >-
          Subscription digital library delivering 13,000+ standards plus
          1,500+ books and 47,000+ papers, with redlines, change alerts,
          annotations, Compass Points metadata, and SAML SSO integration.
      - name: International Recognition
        description: >-
          ASTM standards are referenced in regulations and procurement in
          150+ countries through Memoranda of Understanding with national
          standards bodies and government agencies.
      - name: Proficiency Testing Programs
        description: >-
          25+ interlaboratory proficiency testing programs for petroleum,
          cement, plastics, and other materials with statistical benchmarking.
      - name: Personnel Certification
        description: >-
          ISO/IEC 17024-aligned personnel certification programs in additive
          manufacturing, cannabis, cement, and other technical domains.
  - type: UseCases
    data:
      - name: Procurement and Specification
        description: >-
          Engineers and procurement teams cite ASTM designations (for
          example ASTM A36 structural steel or ASTM C150 portland cement)
          in purchasing contracts to define acceptance criteria.
      - name: Regulatory Compliance
        description: >-
          Government agencies and regulators incorporate ASTM standards by
          reference into building codes, safety regulations, and product
          conformity requirements.
      - name: Laboratory Test Methods
        description: >-
          Testing laboratories run ASTM Test Method standards to produce
          legally defensible measurements of material properties and
          product performance.
      - name: Standards Surveillance
        description: >-
          Compliance teams subscribe to ASTM Compass change alerts to
          track new editions, withdrawals, and redlined revisions of
          standards they depend on.
      - name: Additive Manufacturing Qualification
        description: >-
          F42 standards (additive manufacturing) and the ASTM AM Center
          of Excellence provide qualification frameworks for aerospace,
          medical, and defense AM applications.
      - name: Cannabis Industry Standards
        description: >-
          Committee D37 (Cannabis) provides standards for quality,
          testing, and product specifications adopted by cannabis
          regulators in the US, Canada, and other jurisdictions.
  - type: Integrations
    data:
      - name: SAML 2.0 Single Sign-On
        description: >-
          ASTM Compass supports any SAML-based SSO connection for
          enterprise identity providers; provisioning is configured by
          ASTM on the production environment.
      - name: Shibboleth
        description: >-
          Compass accepts Shibboleth federated identity without
          configuration on the customer side.
      - name: OpenAthens
        description: >-
          Compass accepts OpenAthens federated identity, common in
          university and library deployments.
      - name: IP-Range Authentication
        description: >-
          Enterprise and library subscribers can authenticate users by
          IP range without per-user provisioning.
      - name: Okta and Other IdPs
        description: >-
          Customer implementations include Okta-based SSO (for example,
          Virginia DOT) for one-click access to Compass.
      - name: Third-Party Publisher Content
        description: >-
          Compass aggregates third-party standards from AASHTO, API,
          BSI, and other publishers behind the same subscription and
          identity layer.
  - type: ScaleNumbers
    data:
      - name: Standards Published
        description: 13,000+ globally recognized consensus standards.
      - name: Technical Committees
        description: 150+ technical committees and 2,100+ subcommittees.
      - name: Volunteer Members
        description: 30,000+ volunteer members.
      - name: Countries
        description: Members and partners across 140+ countries; MoUs with 125+ national standards bodies.
      - name: Founded
        description: 1898.
      - name: Compass Catalog
        description: 13,000+ standards, 1,500+ books, 47,000+ articles and papers, 300+ video standards.
  - type: NotableAbsences
    data:
      - name: No Public REST API
        description: >-
          ASTM does not publish a public REST API for its standards
          catalog, Compass content, or proficiency testing results.
          Programmatic access is not offered to the general public.
      - name: No Public GitHub Organization
        description: >-
          ASTM International does not maintain a public GitHub
          organization. There are no canonical reference implementations,
          schemas, or SDKs published openly.
      - name: No OpenAPI or AsyncAPI Specs
        description: >-
          No OpenAPI or AsyncAPI specifications are published by ASTM
          for any of its services.
      - name: No Public Pricing Page
        description: >-
          Compass and Digital Library pricing is sales-quoted; no
          published price list is available.
      - name: No RSS or Atom Feeds
        description: >-
          Press releases and standards updates are not exposed through
          public RSS or Atom feeds for syndication.
      - name: No Public Webhooks
        description: >-
          Compass change alerts are delivered to subscribers via email
          inside the application; no outbound webhook surface exists.
